<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            max-height: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .header-info p {
            font-size: 12px;
            opacity: 0.9;
            margin: 2px 0 0 0;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }

        .message.assistant .content {
            background: #f3f4f6;
            color: #1f2937;
            border-radius: 16px 16px 16px 4px;
        }

        .content {
            padding: 12px 16px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; }
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .voice-btn {
            padding: 12px 16px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .voice-btn:hover {
            transform: scale(1.05);
        }

        .voice-btn.listening {
            animation: listening 1s infinite;
        }

        @keyframes listening {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
        }

        .settings {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            display: none;
        }

        .settings.show {
            display: block;
        }

        .settings-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-item label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
        }

        .setting-item input {
            padding: 8px 12px;
            font-size: 13px;
        }

        /* Scrollbar styling */
        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .settings-toggle {
            padding: 8px 12px;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .settings-toggle:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">S</div>
            <div class="header-info">
                <h1>Sunday</h1>
                <p>AI Assistant • Powered by Claude</p>
            </div>
            <div class="controls">
                <button class="voice-btn" id="voiceBtn" title="Voice Input">🎤</button>
                <button class="settings-toggle" id="settingsToggle">⚙️</button>
                <div class="status-indicator"></div>
            </div>
        </div>

        <div class="settings" id="settings">
            <div class="settings-content">
                <div class="setting-item">
                    <label>API Key (stored locally, never sent to servers)</label>
                    <input type="password" id="apiKey" placeholder="Enter your Anthropic API key">
                </div>
                <button onclick="saveApiKey()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">Save API Key</button>
                <p style="font-size: 12px; color: #6b7280; margin-top: 8px;">Get your API key from <a href="https://console.anthropic.com" target="_blank" style="color: #667eea; text-decoration: none;">console.anthropic.com</a></p>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Ask me anything... (Press Enter to send)"
                    autocomplete="off"
                >
            </div>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsDiv = document.getElementById('settings');
        const apiKeyInput = document.getElementById('apiKey');

        let conversationHistory = [];
        let isListening = false;

        // Load API key from localStorage
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('anthropic_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }
            addMessage('assistant', 'Hi! I\'m Sunday, your AI assistant powered by Claude. To get started, please set your Anthropic API key in the settings (⚙️), then ask me anything!');
        });

        settingsToggle.addEventListener('click', () => {
            settingsDiv.classList.toggle('show');
        });

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert('Please enter a valid API key');
                return;
            }
            localStorage.setItem('anthropic_api_key', key);
            alert('API key saved successfully!');
            settingsDiv.classList.remove('show');
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        voiceBtn.addEventListener('click', toggleVoice);

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            const apiKey = localStorage.getItem('anthropic_api_key');
            if (!apiKey) {
                addMessage('assistant', 'Please set your API key in settings (⚙️) first!');
                return;
            }

            userInput.value = '';
            sendBtn.disabled = true;
            userInput.disabled = true;

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });

            const typingId = addTyping();

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 1024,
                        messages: conversationHistory
                    })
                });

                removeTyping(typingId);

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API Error');
                }

                const data = await response.json();
                const assistantMessage = data.content[0].text;
                
                addMessage('assistant', assistantMessage);
                conversationHistory.push({ role: 'assistant', content: assistantMessage });

                // Text-to-speech (optional)
                if ('speechSynthesis' in window) {
                    speak(assistantMessage);
                }

            } catch (error) {
                removeTyping(typingId);
                addMessage('assistant', `Error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function addMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="content">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageDiv;
        }

        function addTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageDiv;
        }

        function removeTyping(element) {
            if (element && element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Speech Recognition not supported in your browser. Try Chrome, Edge, or Safari.');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();

            if (isListening) {
                recognition.abort();
                isListening = false;
                voiceBtn.classList.remove('listening');
                return;
            }

            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            isListening = true;
            voiceBtn.classList.add('listening');

            recognition.onstart = () => {
                userInput.placeholder = 'Listening...';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                userInput.value = transcript;
            };

            recognition.onend = () => {
                isListening = false;
                voiceBtn.classList.remove('listening');
                userInput.placeholder = 'Ask me anything... (Press Enter to send)';
                if (userInput.value.trim()) {
                    sendMessage();
                }
            };

            recognition.onerror = (event) => {
                isListening = false;
                voiceBtn.classList.remove('listening');
                userInput.placeholder = 'Ask me anything... (Press Enter to send)';
                alert('Error: ' + event.error);
            };

            recognition.start();
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
